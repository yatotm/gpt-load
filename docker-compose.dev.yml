services:
  gpt-load:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: yatotm1994/gpt-load:dev
    container_name: gpt-load-dev
    restart: unless-stopped
    ports:
      - "${DEV_UI_PORT:-3001}:5173"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3001}
      DATABASE_DSN: ${DATABASE_DSN:-root:${MYSQL_ROOT_PASSWORD:-123456}@tcp(mysql:3306)/${MYSQL_DATABASE:-gpt-load}?charset=utf8mb4&parseTime=True&loc=Local}
      REDIS_DSN: ${REDIS_DSN:-redis://redis:6379/0}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:3001}
      VITE_VERSION: ${APP_VERSION:-v2.0.7}
    volumes:
      - ./:/app:cached
      - gpt_load_app_data:/app/data
      - /app/web/node_modules
      - go-build-cache:/go/pkg/mod
    stop_grace_period: ${SERVER_GRACEFUL_SHUTDOWN_TIMEOUT:-10}s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: wget -q --spider -T 10 -O /dev/null http://localhost:${PORT:-3001}/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gpt_load_net

  mysql:
    image: mysql:8.4
    container_name: gpt-load-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gpt-load}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - gpt_load_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - gpt_load_net

  redis:
    image: redis:7-alpine
    container_name: gpt-load-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - gpt_load_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - gpt_load_net

networks:
  gpt_load_net:
    driver: bridge

volumes:
  gpt_load_app_data:
  gpt_load_mysql_data:
  gpt_load_redis_data:
  go-build-cache:
    name: gpt-load_go-build-cache
